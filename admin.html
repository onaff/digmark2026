<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin v2 - BAZNAS Kota Salatiga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .bg-baznas { background-color: #0b6623; color: white; }
        .card-stat { border-left: 4px solid #0b6623; }
        .table-responsive { max-height: 550px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .sticky-top-custom {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
        }

        .border-zmart-merah { border-left-color: #ff0000 !important; }
        .text-zmart-merah { color: #ff0000 !important; }
        .border-upz-biru { border-left-color: #007bff !important; }
        .text-upz-biru { color: #007bff !important; }

        /* Optimasi Tampilan Seluler (Responsive Mobile) */
        @media (max-width: 576px) {
            .navbar-brand { font-size: 1.1rem; }
            .card-body { padding: 10px !important; }
            .table th, .table td { font-size: 0.85rem !important; padding: 8px 6px !important; }
            .badge { font-size: 0.75rem !important; }
            
            .card-stat { border-left-width: 3px; padding: 8px 6px !important; }
            .stat-title { font-size: 0.7rem !important; }
            .stat-number { font-size: 1.2rem !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-baznas sticky-top sticky-top-custom mb-3 mb-md-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="fa-solid fa-chart-line me-2"></i>Admin Dashboard BAZNAS
            </span>
            <button class="btn btn-light btn-sm fw-bold px-3" onclick="muatData()">
                <i class="fa-solid fa-sync me-1"></i> <span class="d-none d-sm-inline">Refresh Data</span>
            </button>
        </div>
    </nav>

    <div class="container-fluid px-2 px-md-4 mb-5">
        
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <h6 class="text-secondary">Mengambil data dari server...</h6>
        </div>

        <div id="mainContent" class="d-none">
            
            <div class="row g-2 mb-2">
                <div class="col-12">
                    <div class="card card-stat shadow-sm p-3">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                <h6 class="text-muted text-uppercase small mb-1 fw-bold">Total Pendaftar</h6>
                                <h2 class="fw-bold mb-0 text-success" id="statTotal">0</h2>
                            </div>
                            <div class="fs-1 text-success"><i class="fa-solid fa-users"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2 g-md-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-warning">
                        <div class="card-body p-0">
                            <h6 class="text-muted text-uppercase small mb-1 stat-title">UMKM Binaan</h6>
                            <h3 class="fw-bold mb-0 text-warning stat-number" id="statUmkm">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-zmart-merah">
                        <div class="card-body p-0">
                            <h6 class="text-muted text-uppercase small mb-1 stat-title">ZMart</h6>
                            <h3 class="fw-bold mb-0 text-zmart-merah stat-number" id="statZmart">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-upz-biru">
                        <div class="card-body p-0">
                            <h6 class="text-muted text-uppercase small mb-1 stat-title">UPZ Masjid</h6>
                            <h3 class="fw-bold mb-0 text-upz-biru stat-number" id="statUpz">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-secondary">
                        <div class="card-body p-0">
                            <h6 class="text-muted text-uppercase small mb-1 stat-title">Umum</h6>
                            <h3 class="fw-bold mb-0 text-secondary stat-number" id="statUmum">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 p-3 h-100">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-chart-pie me-1"></i> Proporsi Kategori Program</h6>
                        <div style="max-height: 230px;" class="d-flex justify-content-center">
                            <canvas id="chartKategori"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 p-3 h-100">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-map-location-dot me-1"></i> Sebaran Per Kecamatan</h6>
                        <div style="max-height: 200px;" class="d-flex justify-content-center w-100">
                            <canvas id="chartKecamatan"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex flex-column gap-3">
                    <div class="d-flex align-items-center justify-content-between w-100">
                        <h5 class="mb-0 fw-bold text-secondary"><i class="fa-solid fa-list me-1"></i> Data Calon Peserta</h5>
                        <button class="btn btn-success btn-sm text-nowrap" onclick="exportKeExcel()">
                            <i class="fa-solid fa-file-excel me-1"></i> Export Excel
                        </button>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                        <input type="text" id="inputCari" class="form-control bg-light border-start-0" placeholder="Cari nama, kecamatan, agama, atau kategori...">
                    </div>
                </div>
                
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-secondary text-nowrap">
                                <tr>
                                    <th>No</th>
                                    <th>Nama</th>
                                    <th>Kecamatan (Kelurahan)</th>
                                    <th>Alamat Detail</th>
                                    <th>Usia</th>
                                    <th>Agama</th> <th>No HP</th>
                                    <th>Email</th>
                                    <th>Kategori</th>
                                    <th>Sosmed</th>
                                </tr>
                            </thead>
                            <tbody id="dataTabel">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <script>
        // ⚠️ GANTI STRING DI BAWAH DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA ⚠️
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwz9Jxk_dRaxm_EPqQNy6tBx9TNx-b4nEDK_BEGxTHCEasNuz2Ia_7QHpktgp05xhFH/exec';
        let masterData = [];
        let chart1, chart2;

        document.addEventListener("DOMContentLoaded", () => { muatData(); });

        function muatData() {
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('mainContent').classList.add('d-none');
            const oldScript = document.getElementById('jsonpScript');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = `${scriptURL}?callback=prosesDataAdmin`;
            document.body.appendChild(script);
        }

        function prosesDataAdmin(data) {
            masterData = data;
            renderDashboard(data);
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('mainContent').classList.remove('d-none');
        }

        function renderDashboard(data) {
            const tbody = document.getElementById('dataTabel');
            tbody.innerHTML = '';

            let countUmkm = 0, countZmart = 0, countUpz = 0, countUmum = 0;
            let kecamatanCounts = { "Argomulyo": 0, "Sidomukti": 0, "Sidorejo": 0, "Tingkir": 0 };

            data.forEach((item, index) => {
                // Kalkulasi data statistik berdasarkan kategori
                if (item.kategori === 'UMKM Binaan') countUmkm++;
                else if (item.kategori === 'ZMart') countZmart++;
                else if (item.kategori === 'UPZ') countUpz++;
                else countUmum++;
                
                if (kecamatanCounts[item.kecamatan] !== undefined) kecamatanCounts[item.kecamatan]++;

                // Format nomor WhatsApp agar otomatis 62
                let cleanWA = item.nohp ? item.nohp.replace(/[^0-9]/g, '') : '';
                if (cleanWA.startsWith('0')) {
                    cleanWA = '62' + cleanWA.substring(1);
                } else if (cleanWA.startsWith('8')) {
                    cleanWA = '62' + cleanWA;
                }
                
                // Pewarnaan lencana pendaftar program
                let badgeClass = 'bg-secondary';
                if (item.kategori === 'UMKM Binaan') badgeClass = 'bg-warning text-dark';
                else if (item.kategori === 'ZMart') badgeClass = 'bg-danger';
                else if (item.kategori === 'UPZ') badgeClass = 'bg-primary';

                // Kolom Kelurahan digabung ke dalam kolom Kecamatan
                let row = `<tr>
                    <td class="text-center">${index + 1}</td>
                    <td class="fw-bold text-nowrap">${item.nama}</td>
                    <td>
                        <span class="badge bg-secondary mb-1 d-inline-block">${item.kecamatan}</span>
                        <br><small class="text-muted">${item.kelurahan || ''}</small>
                    </td>
                    <td class="small text-wrap" style="max-width: 150px;">${item.alamat}</td>
                    <td>${item.usia} Thn</td>
                    <td class="fw-semibold">${item.agama || ' - '}</td> 
                    <td class="text-nowrap">
                        <a href="https://wa.me/${cleanWA}" target="_blank" class="text-decoration-none">
                            <i class="fa-brands fa-whatsapp text-success me-1"></i>${item.nohp}
                        </a>
                    </td>
                    <td class="small">${item.email}</td>
                    <td><span class="badge ${badgeClass}">${item.kategori}</span></td>
                    <td class="small">FB: ${item.facebook}<br>IG: ${item.instagram}<br>TT: ${item.tiktok}<br>SL: ${item.sosmed_lain}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statUmkm').innerText = countUmkm;
            document.getElementById('statZmart').innerText = countZmart;
            document.getElementById('statUpz').innerText = countUpz;
            document.getElementById('statUmum').innerText = countUmum;

            buildCharts(countUmkm, countZmart, countUpz, countUmum, kecamatanCounts);
        }

        function buildCharts(umkm, zmart, upz, umum, kecData) {
            if (chart1) chart1.destroy();
            if (chart2) chart2.destroy();

            // RENDER PIE CHART 4 PILIHAN KATEGORI PROGRAM
            const ctxKat = document.getElementById('chartKategori').getContext('2d');
            chart1 = new Chart(ctxKat, {
                type: 'pie',
                data: {
                    labels: ['UMKM Binaan', 'ZMart', 'UPZ Masjid', 'Umum'],
                    datasets: [{
                        data: [umkm, zmart, upz, umum],
                        backgroundColor: ['#ffc107', '#ff0000', '#007bff', '#6c757d']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // RENDER BAR CHART KECAMATAN
            const ctxKec = document.getElementById('chartKecamatan').getContext('2d');
            chart2 = new Chart(ctxKec, {
                type: 'bar',
                data: {
                    labels: Object.keys(kecData),
                    datasets: [{
                        label: 'Jumlah Peserta',
                        data: Object.values(kecData),
                        backgroundColor: '#0b6623'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // FUNGSI LIVE PENCARIAN OTOMATIS
        document.getElementById('inputCari').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('#dataTabel tr');
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(filter) ? '' : 'none';
            });
        });

        // FUNGSI EXPORT EXCEL PROFESIONAL (Tetap mempertahankan kolom Kelurahan terpisah)
        function exportKeExcel() {
            if (masterData.length === 0) {
                alert("Tidak ada data yang bisa diexport!");
                return;
            }

            const barisJudul1 = ["PESERTA PELATIHAN DIGITAL MARKETING"];
            const barisJudul2 = ["10 Juni 2026"];
            const barisKosong = [""];

            const headers = [
                "No", "Nama Lengkap", "Kecamatan", "Kelurahan", 
                "Alamat Rumah", "Usia", "Kategori Program", "Agama", 
                "No. HP / WhatsApp", "Alamat Email", "Facebook", "Instagram", "TikTok", "Sosmed Lainnya"
            ];

            const rowsData = [
                barisJudul1,
                barisJudul2,
                barisKosong,
                headers
            ];

            masterData.forEach((item, index) => {
                rowsData.push([
                    index + 1,
                    item.nama,
                    item.kecamatan,
                    item.kelurahan,
                    item.alamat,
                    parseInt(item.usia) || item.usia,
                    item.kategori,
                    item.agama || " - ",
                    item.nohp,
                    item.email,
                    item.facebook,
                    item.instagram,
                    item.tiktok,
                    item.sosmed_lain
                ]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(rowsData);
            const range = XLSX.utils.decode_range(ws['!ref']);
            
            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 13 } },
                { s: { r: 1, c: 0 }, e: { r: 1, c: 13 } }
            ];

            const borderGarisTabel = {
                top: { style: "thin", color: { rgb: "D3D3D3" } },
                bottom: { style: "thin", color: { rgb: "D3D3D3" } },
                left: { style: "thin", color: { rgb: "D3D3D3" } },
                right: { style: "thin", color: { rgb: "D3D3D3" } }
            };

            const headerStyle = {
                fill: { fgColor: { rgb: "0B6623" } },
                font: { name: "Segoe UI", size: 11, bold: true, color: { rgb: "FFFFFF" } },
                alignment: { vertical: "center", horizontal: "center", wrapText: true },
                border: {
                    top: { style: "thin", color: { rgb: "000000" } },
                    bottom: { style: "medium", color: { rgb: "000000" } },
                    left: { style: "thin", color: { rgb: "000000" } },
                    right: { style: "thin", color: { rgb: "000000" } }
                }
            };

            const dataStyleDefault = {
                font: { name: "Segoe UI", size: 10 },
                alignment: { vertical: "center", horizontal: "left" },
                border: borderGarisTabel
            };

            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
                    
                    if (!ws[cellAddress]) {
                        if (R >= 3) ws[cellAddress] = { t: 's', v: '' };
                        else continue;
                    }
                    if (!ws[cellAddress].s) ws[cellAddress].s = {};

                    if (R === 0) {
                        ws[cellAddress].s.font = { name: "Segoe UI", size: 14, bold: true, color: { rgb: "0B6623" } };
                        ws[cellAddress].s.alignment = { horizontal: "center", vertical: "center" };
                        continue;
                    }
                    if (R === 1) {
                        ws[cellAddress].s.font = { name: "Segoe UI", size: 11, italic: true, color: { rgb: "555555" } };
                        ws[cellAddress].s.alignment = { horizontal: "center", vertical: "center" };
                        continue;
                    }
                    if (R === 2) continue;

                    if (R === 3) {
                        ws[cellAddress].s = headerStyle;
                    } 
                    else if (R >= 4) {
                        let currentStyle = JSON.parse(JSON.stringify(dataStyleDefault));
                        
                        if (C === 0 || C === 5) { 
                            currentStyle.alignment.horizontal = "center";
                        }
                        if (R % 2 === 1) {
                            currentStyle.fill = { type: "pattern", pattern: "solid", fgColor: { rgb: "F9F9F9" } };
                        }
                        ws[cellAddress].s = currentStyle;
                    }
                }
            }

            const colWidths = headers.map((header, colIndex) => {
                let maxLength = header.length;
                for (let rowIndex = 3; rowIndex < rowsData.length; rowIndex++) {
                    const cellValue = rowsData[rowIndex][colIndex];
                    if (cellValue !== undefined && cellValue !== null) {
                        const len = cellValue.toString().length;
                        if (len > maxLength) maxLength = len;
                    }
                }
                return { wch: maxLength + 3 };
            });
            ws['!cols'] = colWidths;
            ws['!rows'] = [, , , { hpt: 28 }]; 

            ws['!views'] = [{ state: 'frozen', ySplit: 4, showGridLines: true }];
            ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: 3, c: 0 }, e: { r: range.e.r, c: range.e.c } }) };

            XLSX.utils.book_append_sheet(wb, ws, "Data Pendaftar");
            const tanggalHariIni = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `Data_Pendaftar_Digital_Marketing_BAZNAS_${tanggalHariIni}.xlsx`);
        }
    </script>
</body>
</html>

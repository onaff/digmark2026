<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - BAZNAS Kota Salatiga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .bg-baznas { background-color: #0b6623; color: white; }
        .card-stat { border-left: 4px solid #0b6623; }
        .table-responsive { max-height: 550px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* Menyesuaikan shadow & z-index navbar agar selalu berada di lapisan paling depan saat di-scroll */
        .sticky-top-custom {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
        }

        /* Kustomisasi khusus untuk warna merah menyala pada indikator ZMart */
        .border-zmart-merah { border-left-color: #ff0000 !important; }
        .text-zmart-merah { color: #ff0000 !important; }

        /* Optimasi Tampilan Mobile */
        @media (max-width: 576px) {
            .navbar-brand { font-size: 1.1rem; }
            .card-body { padding: 10px !important; }
            .table th, .table td { font-size: 0.85rem !important; padding: 8px 6px !important; }
            .badge { font-size: 0.75rem !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-baznas sticky-top sticky-top-custom mb-3 mb-md-4">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="fa-solid fa-chart-line me-2"></i>Admin Dashboard
            </span>
            <button class="btn btn-light btn-sm fw-bold px-3" onclick="muatData()">
                <i class="fa-solid fa-sync me-1"></i> <span class="d-none d-sm-inline">Refresh</span>
            </button>
        </div>
    </nav>

    <div class="container-fluid px-2 px-md-4 mb-5">
        
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <h6 class="text-secondary">Mengambil data dari server...</h6>
        </div>

        <div id="mainContent" class="d-none">
            
            <div class="row g-2 g-md-3 mb-4">
                <div class="col-6 col-md-4">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                <h6 class="text-muted text-uppercase small mb-1" style="font-size: 0.75rem;">Total Daftar</h6>
                                <h3 class="fw-bold mb-0 text-success fs-2" id="statTotal">0</h3>
                            </div>
                            <div class="fs-1 text-success d-none d-sm-block"><i class="fa-solid fa-users"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-warning">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                <h6 class="text-muted text-uppercase small mb-1" style="font-size: 0.75rem;">UMKM Binaan</h6>
                                <h3 class="fw-bold mb-0 text-warning fs-2" id="statUmkm">0</h3>
                            </div>
                            <div class="fs-1 text-warning d-none d-sm-block"><i class="fa-solid fa-store"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card card-stat shadow-sm p-2 p-md-3 h-100 border-zmart-merah">
                        <div class="d-flex align-items-center justify-content-between">
                            <div>
                                <h6 class="text-muted text-uppercase small mb-1" style="font-size: 0.75rem;">ZMart</h6>
                                <h3 class="fw-bold mb-0 text-zmart-merah fs-2" id="statZmart">0</h3>
                            </div>
                            <div class="fs-1 text-zmart-merah d-none d-sm-block"><i class="fa-solid fa-shop"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 p-3 h-100">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-pie-chart me-1"></i> Proporsi Kategori Program</h6>
                        <div style="max-height: 230px;" class="d-flex justify-content-center">
                            <canvas id="chartKategori"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 p-3 h-100">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-map-location-dot me-1"></i> Sebaran Per Kecamatan</h6>
                        <div style="max-height: 200px;" class="d-flex justify-content-center w-100">
                            <canvas id="chartKecamatan"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex flex-column gap-3">
                    <div class="d-flex align-items-center justify-content-between w-100">
                        <h5 class="mb-0 fw-bold text-secondary"><i class="fa-solid fa-list me-1"></i> Data Calon Peserta</h5>
                        <button class="btn btn-success btn-sm text-nowrap" onclick="exportKeExcel()">
                            <i class="fa-solid fa-file-excel me-1"></i> Export Excel
                        </button>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                        <input type="text" id="inputCari" class="form-control bg-light border-start-0" placeholder="Cari nama, kecamatan, atau nomor...">
                    </div>
                </div>
                
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-secondary text-nowrap">
                                <tr>
                                    <th>No</th>
                                    <th>Nama</th>
                                    <th>Kecamatan</th>
                                    <th>Kelurahan</th>
                                    <th>Alamat Detail</th>
                                    <th>Usia</th>
                                    <th>No HP</th>
                                    <th>Email</th>
                                    <th>Kategori</th>
                                    <th>Sosmed</th>
                                </tr>
                            </thead>
                            <tbody id="dataTabel">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwz9Jxk_dRaxm_EPqQNy6tBx9TNx-b4nEDK_BEGxTHCEasNuz2Ia_7QHpktgp05xhFH/exec';
        
        let masterData = [];
        let chart1, chart2;

        document.addEventListener("DOMContentLoaded", () => {
            muatData();
        });

        function muatData() {
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('mainContent').classList.add('d-none');

            const oldScript = document.getElementById('jsonpScript');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = `${scriptURL}?callback=prosesDataAdmin`;
            
            script.onerror = function() {
                alert("Gagal memuat data! Periksa apakah URL Web App Admin sudah benar.");
                document.getElementById('loading').classList.add('d-none');
            };

            document.body.appendChild(script);
        }

        function prosesDataAdmin(data) {
            if (data.error) {
                alert("Error dari skrip Google: " + data.error);
                document.getElementById('loading').classList.add('d-none');
                return;
            }
            masterData = data;
            renderDashboard(data);
            
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('mainContent').classList.remove('d-none');
        }

        function renderDashboard(data) {
            const tbody = document.getElementById('dataTabel');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">Belum ada data pendaftar yang masuk di Google Sheet.</td></tr>';
                return;
            }

            let countUmkm = 0;
            let countZmart = 0;
            let kecamatanCounts = { "Argomulyo": 0, "Sidomukti": 0, "Sidorejo": 0, "Tingkir": 0 };

            data.forEach((item, index) => {
                if(item.kategori === 'UMKM Binaan') countUmkm++;
                if(item.kategori === 'ZMart') countZmart++;
                
                if (kecamatanCounts[item.kecamatan] !== undefined) {
                    kecamatanCounts[item.kecamatan]++;
                }

                let sosmedBadge = `<div style="min-width: 110px; font-size: 0.8rem; line-height: 1.3;">
                    <strong>FB:</strong> ${item.facebook || '-'}<br>
                    <strong>IG:</strong> ${item.instagram || '-'}<br>
                    <strong>TT:</strong> ${item.tiktok || '-'}<br>
                    <strong>LN:</strong> ${item.sosmed_lain || '-'}
                </div>`;

                let cleanWA = item.nohp.replace(/[^0-9]/g, '');

                let row = `<tr>
                    <td class="text-center">${index + 1}</td>
                    <td class="fw-bold text-nowrap">${item.nama}</td>
                    <td><span class="badge bg-secondary">${item.kecamatan}</span></td>
                    <td class="text-nowrap">${item.kelurahan}</td>
                    <td class="small text-wrap" style="max-width: 180px; min-width: 140px;">${item.alamat}</td>
                    <td class="text-nowrap">${item.usia} Thn</td>
                    <td class="text-nowrap"><a href="https://wa.me/${cleanWA}" target="_blank" class="text-decoration-none fw-semibold"><i class="fa-brands fa-whatsapp text-success me-1"></i>${item.nohp}</a></td>
                    <td class="small">${item.email}</td>
                    <td><span class="badge ${item.kategori === 'UMKM Binaan' ? 'bg-warning text-dark' : 'bg-danger text-white'}">${item.kategori}</span></td>
                    <td>${sosmedBadge}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statUmkm').innerText = countUmkm;
            document.getElementById('statZmart').innerText = countZmart;

            buildCharts(countUmkm, countZmart, data.length - (countUmkm + countZmart), kecamatanCounts);
        }

        function buildCharts(umkm, zmart, umum, kecData) {
            if(chart1) chart1.destroy();
            if(chart2) chart2.destroy();

            const ctxKat = document.getElementById('chartKategori').getContext('2d');
            chart1 = new Chart(ctxKat, {
                type: 'pie',
                data: {
                    labels: ['UMKM Binaan', 'ZMart', 'Umum/Lainnya'],
                    datasets: [{
                        data: [umkm, zmart, umum],
                        backgroundColor: ['#ffc107', '#ff0000', '#6c757d']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctxKec = document.getElementById('chartKecamatan').getContext('2d');
            chart2 = new Chart(ctxKec, {
                type: 'bar',
                data: {
                    labels: Object.keys(kecData),
                    datasets: [{
                        label: 'Jumlah Peserta',
                        data: Object.values(kecData),
                        backgroundColor: '#0b6623'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        // Live Search
        document.getElementById('inputCari').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let rows = document.querySelectorAll('#dataTabel tr');

            rows.forEach(row => {
                let text = row.textContent.toLowerCase();
                if(text.includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        function exportKeExcel() {
            if (masterData.length === 0) {
                alert("Tidak ada data untuk di-export!");
                return;
            }

            const barisJudul1 = ["PESERTA PELATIHAN DIGITAL MARKETING"];
            const barisJudul2 = ["10 Juni 2026"];
            const barisKosong = [""];
            const headerKolom = ["No", "Nama", "Kecamatan", "Kelurahan", "Alamat Detail", "Usia", "No HP", "Email", "Kategori", "Facebook", "Instagram", "TikTok", "Sosmed Lainnya"];

            const rowsData = [
                barisJudul1,
                barisJudul2,
                barisKosong,
                headerKolom
            ];

            masterData.forEach((item, index) => {
                rowsData.push([
                    index + 1,
                    item.nama,
                    item.kecamatan,
                    item.kelurahan,
                    item.alamat,
                    item.usia + " Thn",
                    item.nohp,
                    item.email,
                    item.kategori,
                    item.facebook,
                    item.instagram,
                    item.tiktok,
                    item.sosmed_lain
                ]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(rowsData);

            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 12 } }, 
                { s: { r: 1, c: 0 }, e: { r: 1, c: 12 } }  
            ];

            const borderGarisTabel = {
                top: { style: "thin", color: { rgb: "D3D3D3" } },
                bottom: { style: "thin", color: { rgb: "D3D3D3" } },
                left: { style: "thin", color: { rgb: "D3D3D3" } },
                right: { style: "thin", color: { rgb: "D3D3D3" } }
            };

            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cell_address = { r: R, c: C };
                    const cell_ref = XLSX.utils.encode_cell(cell_address);
                    
                    if (!ws[cell_ref]) {
                        if (R >= 3) ws[cell_ref] = { t: 's', v: '' };
                        else continue;
                    }
                    if (!ws[cell_ref].s) ws[cell_ref].s = {};

                    if (R === 0) {
                        ws[cell_ref].s.font = { name: "Segoe UI", size: 14, bold: true, color: { rgb: "0B6623" } };
                        ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
                        continue;
                    }
                    if (R === 1) {
                        ws[cell_ref].s.font = { name: "Segoe UI", size: 11, italic: true, color: { rgb: "555555" } };
                        ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
                        continue;
                    }
                    if (R === 2) continue;

                    if (R === 3) {
                        ws[cell_ref].s.font = { name: "Segoe UI", size: 11, bold: true, color: { rgb: "FFFFFF" } };
                        ws[cell_ref].s.fill = { type: "pattern", pattern: "solid", fgColor: { rgb: "0B6623" } }; 
                        ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
                        ws[cell_ref].s.border = borderGarisTabel;
                    } 
                    else if (R >= 4) {
                        ws[cell_ref].s.font = { name: "Segoe UI", size: 10 };
                        ws[cell_ref].s.border = borderGarisTabel;
                        
                        if (C === 0 || C === 5 || C === 6 || C === 8) {
                            ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
                        } else {
                            ws[cell_ref].s.alignment = { horizontal: "left", vertical: "center" };
                        }

                        if (R % 2 === 1) {
                            ws[cell_ref].s.fill = { type: "pattern", pattern: "solid", fgColor: { rgb: "F9F9F9" } };
                        }
                    }
                }
            }

            ws['!views'] = [{ showGridLines: true }];

            const colWidths = headerKolom.map((header, colIndex) => {
                let maxLen = header.length;
                for (let rowIndex = 4; rowIndex < rowsData.length; rowIndex++) {
                    const val = rowsData[rowIndex][colIndex];
                    if (val !== undefined && val !== null) {
                        const len = val.toString().length;
                        if (len > maxLen) maxLen = len;
                    }
                }
                return { wch: maxLen + 4 };
            });
            ws['!cols'] = colWidths;

            XLSX.utils.book_append_sheet(wb, ws, "Data Peserta");
            XLSX.writeFile(wb, "Rekap_Peserta_Digital_Marketing_BAZNAS.xlsx");
        }
    </script>
</body>
</html>
